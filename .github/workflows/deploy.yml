name: Deploy Pixel Darkroom

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/pixel_darkroom_deploy
          chmod 600 ~/.ssh/pixel_darkroom_deploy

        - name: Deploy to Tencent Cloud server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/pixel_darkroom_deploy -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no" \
            dist/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/pixel-darkroom/
